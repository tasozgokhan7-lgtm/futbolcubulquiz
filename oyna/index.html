<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oyna | Futbolcu Bul - Quiz</title>
  <meta name="description" content="Futbolcu Bul - Quiz'i hemen indir. Cihazına uygun mağazaya yönlendiriliyorsun." />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#0a140c" />
  <!-- iOS Safari: uygulama yüklüyse "Aç", değilse "Yükle" bannerı gösterir -->
  <meta name="apple-itunes-app" content="app-id=6767035364" />
  <link rel="icon" type="image/png" href="/assets/icon.png" />
  <link rel="apple-touch-icon" href="/assets/icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:radial-gradient(900px 500px at 50% -10%,rgba(34,197,94,.16),transparent 60%),#0a140c;
      color:#eaf5ee;min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;
    }
    .card{max-width:420px;width:100%}
    .icon{width:96px;height:96px;border-radius:24px;box-shadow:0 20px 50px -20px rgba(0,0,0,.6)}
    h1{font-size:1.6rem;font-weight:800;margin:20px 0 8px;letter-spacing:-.02em}
    p{color:#93a99c;margin-bottom:6px}
    .en{font-size:.86rem;opacity:.7}
    .spinner{width:26px;height:26px;margin:22px auto 6px;border:3px solid #1e3a28;
      border-top-color:#22c55e;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .stores{display:flex;flex-direction:column;gap:12px;margin-top:26px}
    .btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#0c1a11;
      border:1px solid #1e3a28;color:#eaf5ee;padding:14px 20px;border-radius:14px;
      text-decoration:none;font-weight:700;transition:border-color .2s,transform .2s}
    .btn:hover{border-color:#22c55e;transform:translateY(-2px)}
    .btn svg{width:22px;height:22px}
    .home{display:inline-block;margin-top:22px;color:#93a99c;font-size:.9rem;text-decoration:none}
    .home:hover{color:#22c55e}
    .hint{margin-top:18px;font-size:.82rem;color:#5c7266}
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="/assets/icon.png" alt="Futbolcu Bul" />
    <h1 id="title">Futbolcu Bul - Quiz</h1>
    <p id="msg">Cihazına uygun mağazaya yönlendiriliyorsun…</p>
    <p class="en" id="msgEn">Redirecting you to the right store…</p>
    <div class="spinner" id="spinner"></div>

    <!-- JS kapalıysa / yönlendirme olmazsa her zaman görünür yedek -->
    <div class="stores">
      <a class="btn" id="iosBtn" href="https://apps.apple.com/tr/app/futbolcu-bul-quiz/id6767035364">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M16.36 1.43c.05.78-.26 1.55-.79 2.13-.55.6-1.44 1.06-2.3.99-.07-.77.3-1.57.79-2.09.55-.58 1.5-1.02 2.3-1.03zM19.5 17.02c-.4.93-.59 1.34-1.11 2.16-.72 1.15-1.74 2.58-3 2.59-1.12.01-1.41-.73-2.93-.72-1.52.01-1.84.73-2.96.72-1.26-.01-2.22-1.3-2.94-2.45-2.02-3.22-2.23-7-1-9.01.88-1.44 2.26-2.28 3.56-2.28 1.32 0 2.15.73 3.24.73 1.06 0 1.7-.73 3.24-.73 1.16 0 2.4.63 3.28 1.72-2.88 1.58-2.41 5.69.62 6.99z"/></svg>
        App Store
      </a>
      <a class="btn" id="androidBtn" href="https://play.google.com/store/apps/details?id=com.futbolcubul.app">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3.6 2.3c-.24.25-.38.63-.38 1.13v17.14c0 .5.14.88.4 1.12l.06.06 9.6-9.6v-.22L3.66 2.24l-.06.06zM17 15.1l-3.2-3.2v-.22l3.2-3.2.07.04 3.79 2.15c1.08.61 1.08 1.62 0 2.24L17.07 15l-.07.1zM13.8 11.9l3.26 3.26-9.85 5.6c-.36.2-.7.19-.97.01l10.4-8.87h-2.84zM7.24 2.53c-.27-.18-.61-.19-.97.01l9.85 5.6-3.26 3.26h-2.83L7.24 2.53z"/></svg>
        Google Play
      </a>
    </div>

    <p class="hint" id="hint" hidden>Otomatik açılmadıysa yukarıdaki butonu kullan.</p>
    <a class="home" href="/">← futbolcubulquiz.com</a>
  </div>

  <script>
    (function () {
      var IOS_URL = 'https://apps.apple.com/tr/app/futbolcu-bul-quiz/id6767035364';
      var PLAY_URL = 'https://play.google.com/store/apps/details?id=com.futbolcubul.app';

      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isAndroid = /Android/i.test(ua);

      function go(url) {
        // replace(): geri tuşu bu ara sayfaya dönüp döngü yapmasın
        window.location.replace(url);
        setTimeout(function () {
          document.getElementById('spinner').hidden = true;
          document.getElementById('hint').hidden = false;
        }, 1500);
      }

      if (isIOS) {
        document.getElementById('androidBtn').hidden = true;
        go(IOS_URL);
      } else if (isAndroid) {
        document.getElementById('iosBtn').hidden = true;
        go(PLAY_URL);
      } else {
        // Masaüstü: yönlendirme yok, iki mağazayı da göster
        document.getElementById('spinner').hidden = true;
        document.getElementById('msg').textContent = 'Uygulamayı telefonundan indir:';
        document.getElementById('msgEn').textContent = 'Download the app on your phone:';
      }
    })();
  </script>
</body>
</html>
